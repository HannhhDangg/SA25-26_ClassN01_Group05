_format_version: "2.1"

services:
  - name: auth-service
    url: http://auth_service:3000
    plugins:
      - name: rate-limiting
        config:
          minute: 100 # Cực kỳ quan trọng: Chỉ cho phép 1 IP gọi API Auth/OTP 100 lần/phút
          limit_by: ip
          policy: local
    routes:
      - name: auth-routes
        paths:
          - /api/auth_ser
          - /api/otp
        strip_path: false

  - name: leave-service
    url: http://leave_service:3000
    plugins:
      - name: rate-limiting
        config:
          minute: 60 # Giới hạn 60 lượt gọi/phút cho các API thông thường (tránh DDoS)
          limit_by: ip
          policy: local
    routes:
      - name: leave-routes
        paths:
          - /api/leave_ser
          - /api/users
          - /uploads
          - /socket.io
        strip_path: false

  - name: noti-service
    url: http://noti_service:3000
    plugins:
      - name: rate-limiting
        config:
          minute: 60
          limit_by: ip
          policy: local
    routes:
      - name: noti-routes
        paths:
          - /api/noti_ser
        strip_path: false
